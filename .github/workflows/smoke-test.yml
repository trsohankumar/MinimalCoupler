name: smoke-test
on:
    push:
        branches: [master]
jobs:
    smoke-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Configure test parameters
              run: |
                sed -i 's/TIME_WINDOW_SIZE .*/TIME_WINDOW_SIZE      = 0.2;/' src/constants.hpp

            - name: Build
              run: |
                cmake -B build
                cmake --build build

            - name: Run smoke test
              run: |
                ./build/tests/solverdummy Fluid 2>&1 | tee fluid.log &
                ./build/tests/solverdummy Solid 2>&1 | tee solid.log
                grep -q "Closing C++ solver dummy" fluid.log
                grep -q "Closing C++ solver dummy" solid.log
